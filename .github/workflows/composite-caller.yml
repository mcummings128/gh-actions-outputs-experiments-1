name: Composite Caller

on:
    workflow_dispatch:

jobs:
    call-composite-action:
        runs-on: ubuntu-latest
        # This job-level outputs block is so that the second job can reference it
        # If you only needed the output within the same job, you wouldn't need this outputs block.
        # We know the name of the step output to reference by looking at the action.yml of the composite action that is being called
        outputs:
            composite-action-output-1: ${{ steps.composite-calling-step.outputs.composite-action-output-1 }}
            composite-action-output-2: ${{ steps.composite-calling-step.outputs.composite-action-output-2 }}
        steps:
            
            - name: 'Checkout repo'
              uses: actions/checkout@v5

            - name: Call composite output action
              id: composite-calling-step
              uses: ./.github/actions/composite-output-action
            
            - name: Show composite action output 1 (same job)
              run: echo 'Composite action output 1 --> ${{ steps.composite-calling-step.outputs.composite-action-output-1 }}'
           
            - name: Show composite action output 2 (same job)
              run: echo 'Composite action output 2 --> ${{ steps.composite-calling-step.outputs.composite-action-output-2 }}'

    # This job shows how to reference the composite action output from a different job, (by referencing the job-level outputs block in the previous job).
    ref-composite-action-output:
        needs: call-composite-action
        runs-on: ubuntu-latest
        steps:
            - name: Show composite action output 1 (different job)
              run: echo 'We are able to access the composite action output from the previous job --> ${{ needs.call-composite-action.outputs.composite-action-output-1 }}'